<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Belum Aktif</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f0e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 380px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  h1 { font-size: 1.2rem; color: #1a1a1a; margin: 0 0 8px; }
  p { color: #777; font-size: 0.9rem; line-height: 1.5; margin: 0; }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🕐</div>
    <h1>Kartu Ini Belum Aktif</h1>
    <p>Kartu belum terdaftar atau sedang dalam proses aktivasi. Hubungi penyedia kartu untuk informasi lebih lanjut.</p>
  </div>
</body>
</html>
